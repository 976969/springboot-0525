server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/training_eval?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      test-while-idle: true
      validation-query: SELECT 1
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.qcby.springboot_0525.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Sa-Token 配置
sa-token:
  token-name: Authorization
  timeout: 86400
  activity-timeout: 1800
  is-concurrent: true
  is-share: false
  token-style: uuid

# 文件上传存储路径
file:
  upload-path: ${UPLOAD_PATH:./uploads}

# 大模型API配置
llm:
  api-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
  api-key: ${LLM_API_KEY:your-api-key-here}
  model: qwen-plus
